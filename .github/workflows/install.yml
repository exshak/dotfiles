name: install

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 12 * * 6'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v2
      - name: Bare install dotfiles
        run: bash install.sh
