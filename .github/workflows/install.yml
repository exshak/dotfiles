name: install

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 12 * * 6'

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.5.0
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v2.3.3
      - name: Bare setup
        run: bash install.sh
      - name: Install packages
        run: brew list
      - name: System defaults
        run: bash .macos
