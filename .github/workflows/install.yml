name: install

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 12 * * 6'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Bare install dotfiles
        uses: actions/checkout@v2
        run: bash install.sh
      - name: Brew bundle
        if: ${{ runner.os == 'macOS' }}
        run: brew bundle --file=~/.brewfile
